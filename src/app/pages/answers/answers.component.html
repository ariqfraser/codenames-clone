<ng-container *ngIf="gameData$ | async as gameData">
    <div class="board">
        <app-card
            *ngFor="let card of gameData.cards; let i = index"
            [word]="card.word"
            [answer]="card.answer"
            [isAnswer]="true">
        </app-card>
    </div>
</ng-container>

<p>Tip: You can click on a card to track the guesses yourself!</p>
